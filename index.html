<!DOCTYPE html>
<html ng-app="system">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EJPG-SYS on GITHUB.IO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body ng-controller="systemCtrl">
  <div class="mt-5 container">
    {{appname}}
    <div>
      <h1 class="text-center">EJPG-SYS on GITHUB.IO</h1>
    </div>
    <hr/>
    <div class="row">
      <div class="col justify-content-end">
        language: 
        <a class="text-dark fw-bold" href="#">en</a>
        <a class="text-dark" href="#">pt</a>
      </div>
    </div>
    <div>
      <h2>articles</h2>
      <table class="table table-hover table-borderless">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">DATE</th>
            <th scope="col">SUBJECT</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th scope="row">1</th>
            <td>2024-10-01</td>
            <td>
              <a class="text-dark" href="article/driven-design.md">DRIVEN DESIGN</a>
            </td>
          </tr>
          <tr>
            <th scope="row">2</th>
            <td>2024-10-02</td>
            <td>
              <a class="text-dark" href="article/driven-event.md">DRIVEN EVENT</a>
            </td>
          </tr>
          <tr>
            <th scope="row">3</th>
            <td>2024-10-02</td>
            <td>
              <a class="text-dark" href="article/artificial-intelligence.md">ARTIFICIAL INTELLIGENCE</a>
            </td>
          </tr>
          <tr>
            <th scope="row">4</th>
            <td>2024-10-02</td>
            <td>
              <a class="text-dark" href="article/machine-learning.md">MACHINE LEARNING</a>
            </td>
          </tr>
          <tr>
            <th scope="row">5</th>
            <td>2024-10-02</td>
            <td>
              <a class="text-dark" href="article/hand-on_driven-design.md">HANDS-ON IN DRIVEN-DESIGN</a>
            </td>
          </tr>
        </tbody>
        <tfoot>
          <th colspan="3">PAGE 1</th>
        </tfoot>
    </table>
    <div>
    <div>
      <hr/>
      <a class="text-dark" href="license.txt">MIT License (c) EJPG</a>
    </div>
    <br/>
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#mainReader">Let me see working!</button>
    <div class="modal fade" id="mainReader">
      <div class="modal-xl modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-titled" ng-bind="article.title"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
          </div>
          <div class="modal-body" ng-bind="article.body">
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js" integrity="sha384-c+qsMuWimzoMxDpSd67QtX89Nctaxh/CBMTgEnKrTahfMz1HgjjwqrzEGYXMZxYi" crossorigin="anonymous"></script>
  <script src="script/system.js"></script>
</body>
</html>
