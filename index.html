<!DOCTYPE html>
<html ng-app="system">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EJPG-SYS on GITHUB.IO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body ng-controller="systemCtrl">
  <div class="mt-5 container">
    <div>
      <h1 class="text-center">EJPG-SYS on GITHUB.IO</h1>
    </div>
    <hr/>
    <div id="systemProgressBar">
      <div class="progress">
        <div class="progress-bar bg-success" role="progressbar" aria-label="Basic example" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
      <div class="progress" role="progressbar" aria-label="Basic example" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar bg-success" style="width: 25%"></div>
      </div>
    </div>
    <div class="invisible" id="enLanguage">
      <div class="row">
        <div class="col justify-content-end">
          language: 
          <a class="text-dark fw-bold" href="#">en</a>
          <a class="text-dark" href="#">pt</a>
        </div>
      </div>
      <div>
        <h2>articles</h2>
        <table class="table table-hover table-borderless">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">DATE</th>
              <th scope="col">SUBJECT</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th ng-repeat="art in article"></th>
              <th scope="row" ng-bind="art.index"></th>
              <td ng-bind="art.dateTime"></td>
              <td>
                <a class="text-dark" href="#" ng-bind="art.title"></a>
              </td>
            </tr>
          </tbody>
          <tfoot>
            <th colspan="3">PAGE 1</th>
          </tfoot>
      </table>
      <div>
      <br/>
    </div>
    <div class="" id="ptLanguage"></div>
      <div class="row">
        <div class="col justify-content-end">
          Idioma: 
          <a class="text-dark" href="#">en</a>
          <a class="text-dark fw-bold" href="#">pt</a>
        </div>
      </div>
      <div>
        <h2>artigos</h2>
        <table class="table table-hover table-borderless">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">DATA</th>
              <th scope="col">ASSUNTO</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th ng-repeat="art in article"></th>
              <th scope="row" ng-bind="art.index"></th>
              <td ng-bind="art.dateTime"></td>
              <td>
                <a class="text-dark" href="#" ng-bind="art.title"></a>
              </td>
            </tr>
          </tbody>
          <tfoot>
            <th colspan="3">PÁGINA 1</th>
          </tfoot>
      </table>
      <div>
      <br/>
    </div>
    <div>
      <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#mainReader">Let me see working!</button>
      <div class="modal fade" id="mainReader">
        <div class="modal-xl modal-dialog modal-dialog-centered modal-dialog-scrollable">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-titled" ng-bind="article.title"></h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
            </div>
            <div class="modal-body" ng-bind="article.body">
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div>
      <hr/>
      <a class="text-dark" href="license.txt">MIT License (c) EJPG</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js" integrity="sha384-c+qsMuWimzoMxDpSd67QtX89Nctaxh/CBMTgEnKrTahfMz1HgjjwqrzEGYXMZxYi" crossorigin="anonymous"></script>
  <script>
    var articles = null;
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'article.json', true);
    xhr.responseType = 'json';
    xhr.onload = function() {
      if (xhr.status === 200) {
        articles = xhr.response;
      }
    }
    xhr.send();
    var userLanguage = 'en';
    var userLanguages = navigator.languages;    
    var i = 0;
    while( i < userLanguages.length) {
      if (userLanguages[i] === 'pt' || userLanguages[i] === 'pt-BR') {
        userLanguage = 'pt';
        break;
      }
      i+=1;
    }
    var system = angular.module("system", []);
    system.controller("systemCtrl", function ($scope) {
      $scope.articles = articles;
      $scope.language = userLanguage;
    });
  </script>
  <script>
    (function main() {
      var iprogress = 0;
      var progressInterval = setInterval(function() {
        if (iprogress <= 5) {
          iprogress++;
        } else {
          clearInterval(progressInterval);
        }
      }, 500);
    })();
  </script>
</body>
</html>
