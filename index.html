          if (articles[i].article_id === article_id) {
            xhr = new XMLHttpRequest();
            xhr.open('GET', articles[i].body);
            xhr.onload = function(data) {
              if (xhr.status === 200)
              $scope.readerModalTitle = articles[i].title;
              $scope.readerModalBody = xhr.responseText;
              $("#readerModal").modal('toggle');
              console.log($scope.readerModalBody);
            }
            xhr.send();
            break;
          }
          i++
        }
      }

        $scope.readerModalTitle = '';
        $scope.readerModalBody = '';
      }
      $scope.readerLicense = function() {
        xhr = new XMLHttpRequest();
        xhr.open('GET', 'license.txt');
        xhr.onload = function(data) {
          if (xhr.status === 200)
          $scope.readerModalTitle = 'License';
          $scope.readerModalBody = xhr.responseText;
          $("#readerModal").modal('toggle');
        }
        xhr.send();
      }
      $scope.artitlesListSize = articles.length;
      $scope.articlesMaxItemsPage = 4;
      $scope.articlesCurrentPage = 1;
      $scope.articlesTotalPages = Math.round($scope.artitlesListSize / $scope.articlesMaxItemsPage);
      $scope.articlesChangePage = function(pageNumber) {
        if ($scope.articlesCurrentPage != pageNumber) {
          $scope.articlesCurrentPage = pageNumber;
